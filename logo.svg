  <ellipse cx="47" cy="17" rx="4" ry="4.5" fill="#0a0a0f"/>
  <!-- Eye shine -->
  <circle cx="35" cy="15.5" r="1.2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="49" cy="15.5" r="1.2" fill="rgba(255,255,255,0.5)"/>
  <!-- Smile -->
