  <rect x="35" y="55" width="10" height="16" fill="#c8a020" rx="1"/>
  <!-- Trophy base -->
  <rect x="24" y="70" width="32" height="8" rx="4" fill="#c8a020" stroke="#a07010" stroke-width="1"/>
  <rect x="20" y="76" width="40" height="6" rx="3" fill="#0e5c2a" stroke="#0a4a22" stroke-width="1"/>
